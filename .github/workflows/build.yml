name: Build Cross-Platform

on:
  push:
    branches: [ main, master, 'develop/**' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  # ============================================================
  # Build JUCE-based native library for every target platform
  # ============================================================
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            rid: win-x64
            lib_name: ownvst3.dll
            cmake_args: -A x64

          # Windows x86
          - os: windows-latest
            rid: win-x86
            lib_name: ownvst3.dll
            cmake_args: -A Win32

          # Windows ARM64
          - os: windows-latest
            rid: win-arm64
            lib_name: ownvst3.dll
            cmake_args: -A ARM64

          # macOS Universal (x86_64 + arm64 fat binary)
          - os: macos-latest
            rid: osx-universal
            lib_name: libownvst3.dylib
            cmake_args: -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

          # Linux x64
          - os: ubuntu-latest
            rid: linux-x64
            lib_name: libownvst3.so
            cmake_args: ""

          # Linux ARM64 (cross-compile from x64 runner)
          - os: ubuntu-latest
            rid: linux-arm64
            lib_name: libownvst3.so
            cmake_args: >-
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=aarch64
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
              -DCMAKE_FIND_ROOT_PATH=/usr/aarch64-linux-gnu
              -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER
              -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY
              -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY

    runs-on: ${{ matrix.os }}
    name: Native – ${{ matrix.rid }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Linux x64 dependencies ────────────────────────────────────────────
      - name: Install Linux x64 dependencies
        if: matrix.rid == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxext-dev \
            libfreetype6-dev libfontconfig1-dev libasound2-dev libgl1-mesa-dev

      # ── Linux ARM64 cross-compile dependencies ────────────────────────────
      - name: Install Linux ARM64 cross-compile toolchain and sysroot
        if: matrix.rid == 'linux-arm64'
        run: |
          sudo apt-get update
          # Cross-compile toolchain + native host libs (juceaide runs on x86_64
          # and must compile juce_gui_basics, so native X11/freetype are required)
          sudo apt-get install -y cmake ninja-build \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxext-dev \
            libfreetype6-dev libfontconfig1-dev libasound2-dev libgl1-mesa-dev

          # Enable ARM64 packages from ports.ubuntu.com
          sudo dpkg --add-architecture arm64
          CODENAME=$(lsb_release -cs)
          # Write ARM64 source to a separate file so the sed below does not touch it
          printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports %s main restricted universe\n' \
            "$CODENAME" | sudo tee    /etc/apt/sources.list.d/arm64.list
          printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports %s-updates main restricted universe\n' \
            "$CODENAME" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          # Restrict ALL existing sources to amd64 (handles http:// and https://)
          # Traditional one-line format (sources.list and *.list files)
          sudo sed -i '/^deb / { /\[arch=/! s/^deb /deb [arch=amd64] / }' /etc/apt/sources.list
          sudo find /etc/apt/sources.list.d -name '*.list' ! -name 'arm64.list' \
            -exec sudo sed -i '/^deb / { /\[arch=/! s/^deb /deb [arch=amd64] / }' {} \;
          # DEB822 format (*.sources files used by Ubuntu 24.04+)
          for src in /etc/apt/sources.list.d/*.sources; do
            [ -f "$src" ] || continue
            sudo awk '
              /^Architectures:/ { has_arch=1 }
              /^$/  { if (in_stanza && !has_arch) print "Architectures: amd64"
                      in_stanza=0; has_arch=0 }
              /^Types:/ { in_stanza=1 }
              { print }
              END   { if (in_stanza && !has_arch) print "Architectures: amd64" }
            ' "$src" | sudo tee "${src}.tmp" > /dev/null && sudo mv "${src}.tmp" "$src"
          done
          # Update: ignore 404 errors from sources that lack arm64 indices;
          # ports.ubuntu.com arm64 index is still fetched successfully.
          sudo apt-get update || true
          sudo apt-get install -y \
            libx11-dev:arm64 libxrandr-dev:arm64 libxinerama-dev:arm64 \
            libxcursor-dev:arm64 libxext-dev:arm64 \
            libfreetype6-dev:arm64 libfontconfig1-dev:arm64 libasound2-dev:arm64 \
            libgl1-mesa-dev:arm64

      # ── JUCE FetchContent cache (avoids re-downloading on every CI run) ──
      - name: Cache JUCE source
        uses: actions/cache@v4
        with:
          path: OwnVST3Juce/build/_deps
          key: juce-8.0.4-${{ runner.os }}-${{ matrix.rid }}
          restore-keys: |
            juce-8.0.4-${{ runner.os }}-

      # ── CMake configure ───────────────────────────────────────────────────
      - name: Configure CMake
        working-directory: OwnVST3Juce
        shell: bash
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ${{ matrix.cmake_args }}

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        working-directory: OwnVST3Juce
        shell: bash
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      # ── Collect artifact (Windows) ────────────────────────────────────────
      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $lib = Get-ChildItem -Path "OwnVST3Juce/build" -Recurse `
            -Filter "${{ matrix.lib_name }}" | Select-Object -First 1
          if ($lib) {
            New-Item -ItemType Directory -Force -Path "artifacts/${{ matrix.rid }}"
            Copy-Item $lib.FullName "artifacts/${{ matrix.rid }}/${{ matrix.lib_name }}"
          } else {
            Write-Error "Library not found: ${{ matrix.lib_name }}"
            exit 1
          }

      # ── Collect artifact (Unix) ───────────────────────────────────────────
      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts/${{ matrix.rid }}
          find OwnVST3Juce/build -name "${{ matrix.lib_name }}" \
            -exec cp {} artifacts/${{ matrix.rid }}/ \;

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}/
          retention-days: 30

  # ============================================================
  # Commit built libraries back into the repository
  # ============================================================
  update-native-libs:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    needs: build-native
    runs-on: ubuntu-latest
    name: Update Native Libraries
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref:   ${{ github.ref }}

      - name: Download Windows x64
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: runtimes/win-x64/native/

      - name: Download Windows x86
        uses: actions/download-artifact@v4
        with:
          name: native-win-x86
          path: runtimes/win-x86/native/
        continue-on-error: true

      - name: Download Windows ARM64
        uses: actions/download-artifact@v4
        with:
          name: native-win-arm64
          path: runtimes/win-arm64/native/
        continue-on-error: true

      - name: Download macOS universal
        uses: actions/download-artifact@v4
        with:
          name: native-osx-universal
          path: runtimes/osx/native/

      - name: Download Linux x64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: runtimes/linux-x64/native/

      - name: Download Linux ARM64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: runtimes/linux-arm64/native/
        continue-on-error: true

      - name: Replicate macOS universal to per-arch folders
        run: |
          mkdir -p runtimes/osx-x64/native runtimes/osx-arm64/native
          cp runtimes/osx/native/* runtimes/osx-x64/native/  || true
          cp runtimes/osx/native/* runtimes/osx-arm64/native/ || true

      - name: Commit updated native libraries
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add runtimes/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Update native libraries [skip ci]"
            git push
          fi

  # ============================================================
  # Build the C# project and pack the NuGet package
  # ============================================================
  build-csharp:
    needs: [build-native, update-native-libs]
    if: always() && needs.build-native.result == 'success'
    runs-on: ubuntu-latest
    name: C# Build & Package

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest native libraries
        if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
        run: git pull origin ${{ github.ref_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Download Windows x64
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: runtimes/win-x64/native/

      - name: Download Windows x86
        uses: actions/download-artifact@v4
        with:
          name: native-win-x86
          path: runtimes/win-x86/native/
        continue-on-error: true

      - name: Download Windows ARM64
        uses: actions/download-artifact@v4
        with:
          name: native-win-arm64
          path: runtimes/win-arm64/native/
        continue-on-error: true

      - name: Download macOS universal
        uses: actions/download-artifact@v4
        with:
          name: native-osx-universal
          path: runtimes/osx/native/

      - name: Download Linux x64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: runtimes/linux-x64/native/

      - name: Download Linux ARM64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: runtimes/linux-arm64/native/
        continue-on-error: true

      - name: Replicate macOS universal to per-arch folders
        run: |
          mkdir -p runtimes/osx-x64/native runtimes/osx-arm64/native
          cp runtimes/osx/native/* runtimes/osx-x64/native/  || true
          cp runtimes/osx/native/* runtimes/osx-arm64/native/ || true

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack NuGet
        working-directory: OwnVST3Host
        run: dotnet pack --configuration Release --no-build -o ../packages
        continue-on-error: true

      - name: Upload C# artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OwnVST3Sharp-Release
          path: |
            bin/Release/
            OwnVST3Host/bin/Release/
            packages/
          retention-days: 30

  # ============================================================
  # Create GitHub Release on version tags
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-native, build-csharp]
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create release archives
        run: |
          cd release-artifacts
          mkdir -p native-all/runtimes
          for dir in native-*/; do
            rid=$(echo "$dir" | sed 's/native-//' | sed 's/\///')
            mkdir -p "native-all/runtimes/$rid/native"
            cp -r "$dir"* "native-all/runtimes/$rid/native/" || true
          done
          cd native-all && zip -r ../OwnVST3-native-all.zip . && cd ..
          cd OwnVST3Sharp-Release && zip -r ../OwnVST3Sharp-Release.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/OwnVST3-native-all.zip
            release-artifacts/OwnVST3Sharp-Release.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
